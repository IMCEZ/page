<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>AI 聊天助手</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-root">
      <div class="app-shell">
        <!-- 视图一：登录 / 注册 -->
        <section id="authPage" class="page page-auth">
          <div class="auth-card">
            <header class="auth-header">
              <div class="auth-icon">🤖</div>
              <h1 class="auth-title">AI 聊天助手</h1>
              <p class="auth-subtitle">登录或注册，开始你的对话旅程</p>
            </header>

            <div class="auth-tabs" aria-hidden="true">
              <button class="auth-tab auth-tab--active" type="button">
                登录
              </button>
              <button class="auth-tab" type="button">注册</button>
            </div>

            <form class="auth-form" autocomplete="on">
              <div class="auth-field auth-field--nickname">
                <label for="nicknameInput" class="auth-label">昵称（仅注册时）</label>
                <input
                  id="nicknameInput"
                  name="nickname"
                  type="text"
                  class="auth-input"
                  placeholder="给自己取个有趣的名字"
                  autocomplete="nickname"
                />
              </div>

              <div class="auth-field">
                <label for="emailInput" class="auth-label">邮箱</label>
                <input
                  id="emailInput"
                  name="email"
                  type="email"
                  class="auth-input"
                  placeholder="name@example.com"
                  autocomplete="email"
                  required
                />
              </div>

              <div class="auth-field">
                <label for="passwordInput" class="auth-label">密码</label>
                <input
                  id="passwordInput"
                  name="password"
                  type="password"
                  class="auth-input"
                  placeholder="请输入密码"
                  autocomplete="current-password"
                  required
                />
              </div>

              <div class="auth-error" id="authError" role="alert"></div>

              <div class="auth-actions">
                <button
                  type="button"
                  id="loginButton"
                  class="btn btn-primary"
                >
                  登录
                </button>
                <button
                  type="button"
                  id="registerButton"
                  class="btn btn-secondary"
                >
                  注册
                </button>
              </div>
            </form>
          </div>
        </section>

        <!-- 视图二：聊天页 -->
        <section id="chatPage" class="page page-chat" aria-hidden="true">
          <header class="chat-header">
            <div class="chat-user">
              <div class="chat-avatar">😊</div>
              <div class="chat-user-info">
                <div class="chat-user-name" id="chatUserNickname">
                  用户昵称
                </div>
                <div class="chat-user-subtitle">已连接到 AI 助手</div>
              </div>
            </div>
            <button
              type="button"
              id="logoutButton"
              class="btn btn-danger btn-compact"
            >
              退出
            </button>
          </header>

          <main class="chat-main">
            <div class="chat-messages" id="chatMessages">
              <!-- 消息列表（由 app.js 填充） -->
            </div>
          </main>

          <footer class="chat-footer">
            <form class="chat-input-row">
              <textarea
                id="chatInput"
                class="chat-input"
                rows="1"
                placeholder="说点什么吧..."
              ></textarea>
              <button
                type="submit"
                id="sendButton"
                class="btn btn-primary chat-send-button"
              >
                发送
              </button>
            </form>
          </footer>
        </section>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
